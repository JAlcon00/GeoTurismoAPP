<div class="min-h-screen bg-slate-50 flex items-center justify-center p-3 sm:p-4">
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 w-full max-w-sm p-5 sm:p-8">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-slate-900 mb-4">
        <svg viewBox="0 0 28 28" width="22" height="22" fill="none" stroke="white"
             stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="14" cy="14" r="9"/>
          <line x1="14" y1="1" x2="14" y2="6"/>
          <line x1="14" y1="22" x2="14" y2="27"/>
          <line x1="1" y1="14" x2="6" y2="14"/>
          <line x1="22" y1="14" x2="27" y2="14"/>
          <circle cx="14" cy="14" r="2.5" fill="white" stroke="none"/>
        </svg>
      </div>
      <h1 class="text-xl font-semibold text-slate-900 tracking-tight">GeoTurismo</h1>
      <p class="text-slate-500 text-sm mt-1">Accede a tu cuenta</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4" novalidate>

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">
          Correo electrónico
        </label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
          </svg>
          <input id="email" type="email" formControlName="email" autocomplete="email"
            class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition-shadow"
            placeholder="usuario@ejemplo.com"
            [attr.aria-invalid]="form.get('email')?.invalid && form.get('email')?.touched"/>
        </div>
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <p class="text-red-500 text-xs mt-1.5 flex items-center gap-1" role="alert">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
            </svg>
            Ingresa un correo válido
          </p>
        }
      </div>

      <!-- Contraseña -->
      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">
          Contraseña
        </label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
          </svg>
          <input id="password" type="password" formControlName="password" autocomplete="current-password"
            class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition-shadow"
            placeholder="••••••••"
            [attr.aria-invalid]="form.get('password')?.invalid && form.get('password')?.touched"/>
        </div>
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <p class="text-red-500 text-xs mt-1.5 flex items-center gap-1" role="alert">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
            </svg>
            La contraseña es requerida
          </p>
        }
      </div>

      @if (errorMsg) {
        <div class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-2.5" role="alert">
          <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
          </svg>
          {{ errorMsg }}
        </div>
      }

      <button type="submit" [disabled]="loading || form.invalid"
        class="w-full flex items-center justify-center gap-2 bg-slate-900 hover:bg-slate-700 disabled:opacity-40 disabled:cursor-not-allowed text-white font-medium py-2.5 rounded-lg transition-colors text-sm mt-2"
        aria-live="polite">
        @if (loading) {
          <svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" d="M12 3a9 9 0 1 0 9 9"/>
          </svg>
          Iniciando sesión...
        } @else {
          Iniciar sesión
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/>
          </svg>
        }
      </button>

    </form>

    <p class="text-center text-sm text-slate-500 mt-6">
      ¿No tienes cuenta?
      <a routerLink="/auth/register" class="text-slate-900 font-medium hover:underline">Regístrate</a>
    </p>

  </div>
</div>
