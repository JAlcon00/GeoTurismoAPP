<nav class="bg-slate-900 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-3 sm:px-5 py-3 flex items-center justify-between gap-2 min-w-0">

    <!-- Logo -->
    <div class="flex items-center gap-2 sm:gap-7 min-w-0">
      <a routerLink="/dashboard" class="flex items-center gap-2 shrink-0 group" aria-label="GeoTurismo — inicio">
        <svg viewBox="0 0 28 28" width="24" height="24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" class="text-sky-400 group-hover:text-sky-300 transition-colors" aria-hidden="true">
          <circle cx="14" cy="14" r="9"/>
          <line x1="14" y1="1" x2="14" y2="6"/>
          <line x1="14" y1="22" x2="14" y2="27"/>
          <line x1="1" y1="14" x2="6" y2="14"/>
          <line x1="22" y1="14" x2="27" y2="14"/>
          <circle cx="14" cy="14" r="2.5" fill="currentColor" stroke="none"/>
        </svg>
        <span class="font-semibold text-sm sm:text-base tracking-wide text-white hidden xs:inline sm:inline">GeoTurismo</span>
      </a>

      <!-- Nav links -->
      <nav class="flex items-center gap-0.5 sm:gap-1" aria-label="Navegación principal">
        <a routerLink="/dashboard" routerLinkActive="bg-slate-700 text-white"
           class="flex items-center gap-1 sm:gap-1.5 px-2 sm:px-3 py-1.5 rounded-lg text-xs sm:text-sm text-slate-300 hover:bg-slate-800 hover:text-white transition-colors"
           aria-label="Ver mapa">
          <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z"/>
          </svg>
          <span class="hidden sm:inline">Mapa</span>
        </a>
        <a routerLink="/manage" routerLinkActive="bg-slate-700 text-white"
           class="flex items-center gap-1 sm:gap-1.5 px-2 sm:px-3 py-1.5 rounded-lg text-xs sm:text-sm text-slate-300 hover:bg-slate-800 hover:text-white transition-colors"
           aria-label="Panel de gestión">
          <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z"/>
          </svg>
          <span class="hidden sm:inline">Gestión</span>
        </a>
      </nav>
    </div>

    <!-- Usuario y sesión -->
    @if (auth.currentUser()) {
      <div class="flex items-center gap-1.5 sm:gap-3 shrink-0">
        <div class="hidden sm:flex items-center gap-2 text-sm text-slate-300 min-w-0">
          <svg class="w-4 h-4 text-slate-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
          </svg>
          <span class="truncate max-w-[120px]">{{ auth.currentUser()!.name }}</span>
        </div>
        <button
          (click)="auth.logout()"
          class="flex items-center gap-1 sm:gap-1.5 text-xs sm:text-sm text-slate-300 hover:text-white hover:bg-slate-800 px-2.5 sm:px-3 py-1.5 rounded-lg transition-colors"
          aria-label="Cerrar sesión">
          <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75"/>
          </svg>
          <span class="hidden sm:inline">Salir</span>
        </button>
      </div>
    }

  </div>
</nav>
